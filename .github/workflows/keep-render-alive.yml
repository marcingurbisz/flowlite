name: Keep Render Test Instance Alive

on:
  schedule:
    - cron: "*/5 4-23 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Warsaw keepalive window
        id: keepalive_window
        run: |
          warsaw_hour=$(TZ=Europe/Warsaw date +%H)
          if (( 10#${warsaw_hour} < 6 )); then
            echo "Current Warsaw hour is ${warsaw_hour}; outside 06:00-24:00 keepalive window. Skipping ping."
            echo "should_ping=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_ping=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping configured Render URL
        if: steps.keepalive_window.outputs.should_ping == 'true'
        env:
          FLOWLITE_RENDER_URL: ${{ vars.FLOWLITE_RENDER_URL }}
        run: |
          if [[ -z "${FLOWLITE_RENDER_URL}" ]]; then
            echo "FLOWLITE_RENDER_URL is not set. Skipping ping."
            exit 0
          fi

          curl -fsS --retry 2 --retry-delay 2 --max-time 20 "${FLOWLITE_RENDER_URL%/}/api/flows" > /dev/null
